<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sweet Bills — History</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="app-body">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-icon">🎂</span>
      <span class="sidebar-name">Sweet Bills</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/billing" class="nav-item">🧾 New Bill</a>
      <a href="/history" class="nav-item active">📋 History</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar">{{ user.name[0] }}</div>
      <div class="user-info">
        <div class="user-name">{{ user.name }}</div>
        <div class="user-role">{{ user.role }}</div>
      </div>
      <button class="logout-btn" id="logoutBtn" title="Logout">⏻</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="page-title">Bill History</h2>
      </div>
      <div class="topbar-right">
        <input type="text" id="historySearch" class="search-box" placeholder="🔍  Search by bill ID or customer…" style="width:260px"/>
      </div>
    </header>

    <!-- Summary Cards -->
    <div class="summary-strip" id="summaryStrip">
      <div class="strip-card">
        <div class="strip-num" id="sTotalBills">—</div>
        <div class="strip-label">Total Bills</div>
      </div>
      <div class="strip-card">
        <div class="strip-num" id="sTodayBills">—</div>
        <div class="strip-label">Today's Bills</div>
      </div>
      <div class="strip-card">
        <div class="strip-num" id="sTodayRevenue">—</div>
        <div class="strip-label">Today's Revenue</div>
      </div>
      <div class="strip-card">
        <div class="strip-num" id="sTotalRevenue">—</div>
        <div class="strip-label">Total Revenue</div>
      </div>
    </div>

    <!-- Bills Table -->
    <div class="card history-card">
      <table class="bills-table" id="billsTable">
        <thead>
          <tr>
            <th>Bill ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total</th>
            <th>Payment</th>
            <th>Cashier</th>
            <th>Date & Time</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="billsBody">
          <tr><td colspan="8" class="table-empty">Loading bills…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Bill Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Bill Detail</h3>
        <button class="modal-close" id="closeDetail">✕</button>
      </div>
      <div class="receipt" id="detailContent"></div>
      <div class="modal-actions">
        <button class="btn-print" onclick="window.print()">🖨 Print</button>
      </div>
    </div>
  </div>

  <script src="/static/js/history.js"></script>
</body>
</html>
